---
#' Files.
files:
  #' Libraries files.
  libraries:
    #' Structure organism pairs libraries.
    sop:
      #' List of prepared structure organism pairs libraries.
      prepared:
        #' Closed prepared structure organism pairs library. STRING
        closed: data/interim/libraries/sop/closed_prepared.tsv.gz
        #' ECMDB prepared structure organism pairs library. STRING
        ecmdb: data/interim/libraries/sop/ecmdb_prepared.tsv.gz
        #' GNPS prepared structure organism pairs library. STRING
        gnps: data/interim/libraries/sop/gnps_11566051_prepared.tsv.gz
        #' HMDB prepared structure organism pairs library. STRING
        hmdb: data/interim/libraries/sop/hmdb_prepared.tsv.gz
        #' ISDB NormanSusDat prepared structure organism pairs library. STRING
        isdbnormansusdat: data/interim/libraries/sop/isdbnormansusdat_14854025_prepared.tsv.gz
        #' CSF Metabolome prepared structure organism pairs library. STRING
        csfmetabolome: data/interim/libraries/sop/csfmetabolome_prepared.tsv.gz
        #' Fecal Metabolome prepared structure organism pairs library. STRING
        fecalmetabolome: data/interim/libraries/sop/fecalmetabolome_prepared.tsv.gz
        #' Saliva Metabolome prepared structure organism pairs library. STRING
        salivametabolome: data/interim/libraries/sop/salivametabolome_prepared.tsv.gz
        #' Serum Metabolome prepared structure organism pairs library. STRING
        serummetabolome: data/interim/libraries/sop/serummetabolome_prepared.tsv.gz
        #' Sweat Metabolome prepared structure organism pairs library. STRING
        sweatmetabolome: data/interim/libraries/sop/sweatmetabolome_prepared.tsv.gz
        #' Urine Metabolome prepared structure organism pairs library. STRING
        urinemetabolome: data/interim/libraries/sop/urinemetabolome_prepared.tsv.gz
        #' MCDB prepared structure organism pairs library. STRING
        mcdb: data/interim/libraries/sop/mcdb_prepared.tsv.gz
        #' Exposome Explorer prepared structure organism pairs library. STRING
        # TODO too different format for now
        # exposome_explorer: data/interim/libraries/sop/exposome_explorer_prepared.tsv.gz
        #' SMPDB prepared structure organism pairs library. STRING
        smpdb: data/interim/libraries/sop/smpdb_prepared.tsv.gz
        #' MiMeDB prepared structure organism pairs library. STRING
        mimedb: data/interim/libraries/sop/mimedb_prepared.tsv.gz
        #' T3DB prepared structure organism pairs library. STRING
        t3db: data/interim/libraries/sop/t3db_prepared.tsv.gz
        #' BovineDB prepared structure organism pairs library. STRING
        bovinedb: data/interim/libraries/sop/bovinedb_prepared.tsv.gz
        #' ContaminantDB prepared structure organism pairs library. STRING
        # TODO too different format for now
        # contaminantdb: data/interim/libraries/sop/contaminantdb_prepared.tsv.gz
        #' MarkerDB prepared structure organism pairs library. STRING
        # TODO too different format for now
        # markerdb: data/interim/libraries/sop/markerdb_prepared.tsv.gz
        #' YMDB prepared structure organism pairs library. STRING
        ymdb: data/interim/libraries/sop/ymdb_prepared.tsv.gz
        #' Cannabis Database prepared structure organism pairs library. STRING
        cannabisdatabase: data/interim/libraries/sop/cannabisdatabase_prepared.tsv.gz
        #' Lotus prepared structure organism pairs library. STRING
        lotus: data/interim/libraries/sop/lotus_prepared.tsv.gz
        #' RT prepared structure organism pairs library. STRING
        rt: data/interim/libraries/sop/rt_prepared.tsv.gz
        #' Massbank spectral prepared structure organism pairs library. STRING
        massbank: data/interim/libraries/sop/massbank_202510_prepared.tsv.gz
        #' Merlin spectral prepared structure organism pairs library. STRING
        merlin: data/interim/libraries/sop/merlin_16984129_prepared.tsv.gz
        #' Wikidata spectral prepared structure organism pairs library. STRING
        wikidata: data/interim/libraries/sop/wikidata_5607185_prepared.tsv.gz

      #' Merged structure organism pairs library.
      merged:
        #' Merged structure organism pairs library keys. STRING
        keys: data/interim/libraries/sop/merged/keys.tsv.gz

        #' Organisms libraries.
        organisms:
          #' Organisms names. STRING
          names: data/interim/libraries/sop/merged/organisms/names.tsv.gz

          #' Organisms taxonomies.
          taxonomies:
            #' OTT organisms taxonomy. STRING
            ott: data/interim/libraries/sop/merged/organisms/taxonomies/ott.tsv.gz

        #' Structures libraries.
        structures:
          #' Structures processed. STRING
          processed: data/interim/libraries/sop/merged/structures/processed.csv.gz

          #' Structures canonical SMILES mapping. STRING
          canonical: data/interim/libraries/sop/merged/structures/canonical.tsv.gz

          #' Structures stereo. STRING
          stereo: data/interim/libraries/sop/merged/structures/stereo.tsv.gz

          #' Structures metadata. STRING
          metadata: data/interim/libraries/sop/merged/structures/metadata.tsv.gz


          #' Structures taxonomies.
          taxonomies:
            #' Classyfire structures taxonomy. STRING
            cla: data/interim/libraries/sop/merged/structures/taxonomies/classyfire.tsv.gz

            #' NPClassifier structures taxonomy. STRING
            npc: data/interim/libraries/sop/merged/structures/taxonomies/npc.tsv.gz

            #' Additional ClassyFire taxonomy cache to supplement library data.
            #' Structures in the merged library without ClassyFire taxonomy will
            #' be looked up here. Leave empty to skip. STRING
            c: data/interim/libraries/sop/merged/structures/taxonomies/classyfire_cache.csv

            #' Additional NPClassifier taxonomy cache to supplement library data.
            #' Structures in the merged library without NPClassifier taxonomy
            #' will be looked up here. Leave empty to skip. STRING
            n: data/interim/libraries/sop/merged/structures/taxonomies/npclassifier_cache.csv

#' Organisms related parameters.
organisms:
  #' Organisms filter related parameters.
  filter:
    #' Filter library to restrict it to a portion of organisms only. BOOLEAN
    mode: false

    #' Level at which the library will be filtered.
    #' Must be one of "domain", "phylum", "class", "order",
    #' "family", "tribe", "genus", "species", "varietas" . STRING
    level: phylum

    #' Value to be applied for filtering.
    #' "OR" can be used as "|".
    # Example: "Simaroubaceae|Gentianaceae". STRING
    value: Streptophyta
