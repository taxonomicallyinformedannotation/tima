---
#' Files.
files:
  #' Annotations files.
  annotations:
    #' List of prepared annotations.
    prepared:
      #' List of prepared structural annotations.
      structural:
        #' Prepared MS1 structural annotations. STRING
        ms1: data/interim/annotations/example_ms1Prepared.tsv.gz

  #' Features files.
  features:
    #' Prepared features file. STRING
    prepared: data/interim/features/example_features.tsv.gz

  #' Libraries files.
  libraries:
    #' Structure organism pairs libraries.
    sop:
      #' Merged structure organism pairs library.
      merged:
        #' Merged structure organism pairs library keys. STRING
        keys: data/interim/libraries/sop/merged/keys.tsv.gz

        #' Structures libraries.
        structures:
          #' Structures stereo. STRING
          stereo: data/interim/libraries/sop/merged/structures/stereo.tsv.gz

          #' Structures metadata. STRING
          metadata: data/interim/libraries/sop/merged/structures/metadata.tsv.gz

          #' Structures taxonomies.
          taxonomies:
            #' Classyfire structures taxonomy. STRING
            cla: data/interim/libraries/sop/merged/structures/taxonomies/classyfire.tsv.gz

            #' NPClassifier structures taxonomy. STRING
            npc: data/interim/libraries/sop/merged/structures/taxonomies/npc.tsv.gz

  #' Networks files.
  networks:
    #' Spectral networks files.
    spectral:
      #' Edges files.
      edges:
        #' Raw edges file.
        raw:
          #' Raw ms1 edges file. STRING
          ms1: data/interim/features/example_edgesMasses.tsv

#' MS related parameters.
ms:
  #' List of adducts to be used.
  adducts:
    #' List of adducts to be used in negative. STRING
    neg:
      - "[M-H3]3-"
      - "[M-H2]2-"
      - "[M]-"
      - "[M-H]-"
      - "[M+F]-"
      - "[M+Na-H2]-"
      - "[M+Cl]-"
      - "[M+K-H2]-"
      - "[M+Br]-"
      - "[2M-H]-"
      - "[3M-H]-"

    #' List of adducts to be used in positive. STRING
    pos:
      - "[M+H3]3+"
      - "[M+H2Na]3+"
      - "[M+HNa2]3+"
      - "[M+Na3]3+"
      - "[M+H2]2+"
      - "[M+HNa]2+"
      - "[M+Mg]2+"
      - "[M+HK]2+"
      - "[M+Ca]2+"
      - "[M+Na2]2+"
      - "[M+Fe]2+"
      - "[M]+"
      - "[M+H]+"
      - "[M+H4N]+"
      - "[M+Na]+"
      - "[M+K]+"
      - "[M+Fe-H2]+"
      - "[M+Fe-H]+"
      - "[M+Cu]+"
      - "[2M+Mg]2+"
      - "[2M+Ca]2+"
      - "[2M+Fe]2+"
      - "[2M+H]+"
      - "[2M+H4N]+"
      - "[2M+Na]+"
      - "[2M+K]+"

    #' Adduct consistency related parameters.
    consistency:
      #' Consistency strategy for adduct attribution.
      #' Choices: off, conditional, strict. STRING
      type: conditional

      #' In conditional mode, minimum local graph degree at which consistency
      #' checks are activated. INTEGER
      min_degree: 3

      #' Minimal number of independent neighbors supporting an adduct assignment.
      #' INTEGER
      min_support: 2

  #' List of clusters to be used.
  clusters:
    #' List of clusters to be used in negative. STRING
    neg:
      # - "H2O"        # (water)                        ~18.011
      - "CH2O2"        # (formic acid)                  ~46.006
      - "NaCl"         # (sodium chloride)              ~57.959
      - "C2H4O2"       # (acetic acid)                  ~60.021
      # - "H2PO4"      # (phosphoric)                   ~96.969
      # - "C2HF3O2"    # (tfa)                          ~113.993

    #' List of clusters to be used in positive. STRING
    pos:
      - "H2O"          # (water)                        ~18.011
      # - "CH4O"       # (methanol)                     ~32.026
      # - "C2H6O"      # (ethanol)                      ~46.042
      - "C2H3N"        # (acetonitrile)                 ~41.053
      - "C2H7N"        # (ethylamine)                   ~45.058
      - "NH3"          # (ammonia)                      ~17.027
      - "CH2O2"        # (formic acid)                  ~46.006
      - "C2H4O2"       # (acetic acid)                  ~60.021
      - "NaCl"         # (sodium chloride)              ~57.959
      - "KCl"          # (potassium chloride)           ~73.933
      # - "C3H8O"      # (isopropanol)                  ~60.058
      - "C2H6OS"       # (dmso)                         ~78.014

  #' List of neutral losses to be used. STRING
  neutral_losses:
    # - "H2 (dihydrogen)"                                # ~2.016
    - "CH2 (methylene)"                                # ~14.016
    - "O"                                              # ~15.995
    - "H3N (ammonia)"                                  # ~17.027
    - "H2O (water)"                                    # ~18.011
    - "HF (hydrogen fluoride)"                         # ~20.006
    - "CO"                                             # ~27.995
    - "C2H4 (ethene)"                                  # ~28.031
    - "C2H5 (ethyl radical)"                           # ~29.039
    - "NO (nitric oxide)"                              # ~29.998
    - "CH2O (formaldehyde)"                            # ~30.011
    - "H5ON (H2O-H3N)"                                 # ~35.037
    - "H4O2 (2xH2O)"                                   # ~36.021
    - "C2H2O (ethenone)"                               # ~42.011
    - "CO2"                                            # ~43.990
    - "C2H4O (acetaldehyde)"                           # ~44.026
    - "CHO2"                                           # ~44.998
    - "CF2 (perfluoroalkyl)"                           # ~49.997
    - "CHF2 (difluoromethyl)"                          # ~51.005
    - "H6O3 (3xH2O)"                                   # ~54.032
    - "C2O2 (2xCO)"                                    # ~55.990
    - "C3H4O (acrolein)"                               # ~56.026
    - "C2F2 (fluorocarbon)"                            # ~61.997
    - "SO2 (sulfur dioxide)"                           # ~63.962
    - "CF2O (carbonyl difluoride)"                     # ~65.992
    - "CH6O3 (combination)"                            # ~66.032
    - "C4H4O (furan)"                                  # ~68.026
    - "CF3 (trifluoromethyl)"                          # ~68.995
    - "H8O4 (4xH2O)"                                   # ~72.042
    - "SO3 (sulfur trioxide)"                          # ~79.957
    - "HPO3 (metaphosphoric)"                          # ~79.966
    - "C3H6O3 (sugar)"                                 # ~90.032
    - "H2O4S (sulfuric)"                               # ~97.967
    - "H3O4P (phosphoric)"                             # ~97.977
    - "C2F4 (perfluoroalkyl)"                          # ~99.994
    - "C4H8O4 (sugar)"                                 # ~120.042
    - "C6H6O3 (HRF)"                                   # ~126.032
    - "C5H8O4 (pentose-H2O)"                           # ~132.042
    - "C8H8O2 (RDA-1)"                                 # ~136.052
    - "C6H8O4 (HRF)"                                   # ~144.042
    - "C6H10O4 (methylpentose/desoxyhexose-H2O)"       # ~146.058
    - "C3F6 (perfluoroalkyl)"                          # ~149.990
    - "C8H8O3 (RDA-2)"                                 # ~152.047
    - "C6H10O5 (hexose-H2O)"                           # ~162.053
    - "C8H8O4 (RDA-3)"                                 # ~168.042
    - "C8H10O4 (RDA-2-H2O)"                            # ~170.058
    - "C6H12O6 (hexose)"                               # ~180.063
    - "C5H14NO4P (phosphocholine-head)"                # ~183.066
    - "C11H10O4 (sinapoyl)"                            # ~206.058
    - "C16H30O (palmitoyl)"                            # ~238.230
    - "C18H32O (linoleoyl)"                            # ~264.245
    - "C18H34O (oleoyl)"                               # ~266.261
    - "C18H36O (stearoyl)"                             # ~268.277
    - "C12H20O8 (2xmethylpentose/desoxyhexose-H2O)"    # ~292.116
    - "C12H20O10 (2xhexose-H2O)"                       # ~324.106
    # much less common ones
    - "CH3N (methanimine)"     # ~29.027
