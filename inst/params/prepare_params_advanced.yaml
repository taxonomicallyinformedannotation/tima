      - "[M+H3]3+"
      - "[M+Fe]3+"
      - "[M+H2]2+"
      - "[M+H8N2]2+"
      - "[M+Na2]2+"
      - "[M+K2]2+"
      - "[M+Cu2]2+"
      - "[M+Mg]2+"
      - "[M+Ca]2+"
      - "[M+Fe]2+"
      - "[M]+"
      - "[M+H]+"
      - "[M+H4N]+"
      - "[M+Na]+"
