repos:

# R formatting and linting
- repo: local
  hooks:
    - id: air-format
      name: Format R code with Air
      entry: air format
      language: system
      files: '\.[Rr]$'

    - id: jarl
      name: Lint R code with Jarl
      entry: jarl check
      language: system
      files: '\.[Rr]$'

# Keep useful R package checks
- repo: https://github.com/lorenzwalthert/precommit
  rev: v0.4.3.9025
  hooks:
    - id: use-tidy-description
    - id: parsable-R
    - id: no-browser-statement
    - id: no-print-statement
    - id: no-debug-statement
    - id: deps-in-desc
    - id: readme-rmd-rendered

# Generic repository hygiene
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-added-large-files
      args: [--maxkb=200]

    - id: file-contents-sorter
      files: '^\.Rbuildignore$'

    - id: check-case-conflict
    - id: check-merge-conflict
    - id: check-shebang-scripts-are-executable
    - id: check-symlinks
    - id: check-toml
    - id: check-xml
    - id: check-yaml
    - id: mixed-line-ending

    - id: end-of-file-fixer
      exclude: '\.Rd'

    - id: trailing-whitespace

# Prevent accidental commits
- repo: local
  hooks:
    - id: forbid-r-artifacts
      name: Don't commit R workspace files
      entry: Cannot commit .Rhistory, .RData, .Rds or .rds.
      language: fail
      files: '\.(Rhistory|RData|Rds|rds)$'
      exclude: '^inst/extdata/.*\.rds$'

ci:
  autoupdate_schedule: monthly
